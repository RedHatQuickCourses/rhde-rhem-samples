apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: warehouse
spec:
  selector:
    matchLabels:
      location: warehouse
  template:
    spec:
      applications: []
      config:
      - inline:
        - content: |-
            export PS1="managed device: {{ .metadata.labels.alias }}\$ "

          path: /etc/profile.d/managed-device.sh
        name: ps1
      resources:
      - monitorType: Disk
        samplingInterval: 5s
        path: /sysroot
        alertRules:
        - severity: Warning
          duration: 1m          
          percentage: 50
          description: Disk is over 50% full for over 1min.
        - severity: Critical
          duration: 3m
          percentage: 80
          description: Disk is over 80% full over 3min.
